# Copy to: .template/repo-settings.yml
# stack: custom does not auto-fill commands — replace the examples below with your real install/lint/test/build lines.
# Use "" to skip a phase entirely.

project:
  stack: custom

commands:
  install: "npm ci"
  lint: "npm run lint"
  test: "npm test"
  build: ""

ci:
  run_lint: true
  run_test: true
  run_build: false
