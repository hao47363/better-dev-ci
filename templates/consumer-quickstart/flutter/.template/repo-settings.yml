# Copy to: .template/repo-settings.yml
# Empty commands.* → Flutter stack defaults (pub get, analyze, test). Enable build for apk/ipa when you want it in CI.

project:
  stack: flutter

commands:
  install: ""
  lint: ""
  test: ""
  build: ""

ci:
  run_lint: true
  run_test: true
  run_build: false
