# Copy to: .github/workflows/ci.yml
# Custom stack: set every command in .template/repo-settings.yml (no presets). runtime stays "none" unless you add a setup-runtime kind yourself.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  universal-ci:
    uses: hao47363/better-dev-ci/.github/workflows/universal-ci.yml@stable
    with:
      tooling_repository: hao47363/better-dev-ci
      tooling_ref: stable
      tooling_auth_mode: none
      trigger_event_name: ${{ github.event_name }}
      pr_base_sha: ${{ github.event.pull_request.base.sha || '' }}
      pr_head_sha: ${{ github.event.pull_request.head.sha || '' }}
      pr_head_ref: ${{ github.head_ref || '' }}
      pr_title: ${{ github.event.pull_request.title || '' }}
      runtime: none
    secrets: inherit
